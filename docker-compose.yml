version: '3.8'

services:
  pdf-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-mcp-server
    ports:
      - "8001:8001"
    environment:
      - RUST_LOG=info
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_DIR=/app/data
      - MAX_FILE_SIZE_MB=100
    volumes:
      - pdf_data:/app/data
    restart: unless-stopped
    networks:
      - pdf-network

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: pdf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pdf-network

volumes:
  pdf_data:
    driver: local
  redis_data:
    driver: local

networks:
  pdf-network:
    driver: bridge
