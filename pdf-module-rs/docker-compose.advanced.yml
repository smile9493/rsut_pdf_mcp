version: '3.8'

services:
  # PDF Advanced ETL Service
  pdf-advanced-etl:
    image: pdf-module-etl:latest
    container_name: pdf-advanced-etl
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"  # MCP SSE port
    environment:
      # 日志配置
      - RUST_LOG=${RUST_LOG:-info}
      
      # LLM 配置
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
      
      # 数据库配置
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING:-postgresql://postgres:postgres@postgres:5432/pdf_etl}
      - DB_TABLE_NAME=${DB_TABLE_NAME:-extracted_documents}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-20}
      
      # 提取引擎配置
      - EXTRACTION_ENGINE=${EXTRACTION_ENGINE:-lopdf}
      - EXTRACTION_CHUNK_STRATEGY=${EXTRACTION_CHUNK_STRATEGY:-page}
      - EXTRACTION_CHUNK_SIZE=${EXTRACTION_CHUNK_SIZE:-2000}
      
      # 高级流水线配置
      - ENABLE_LAYOUT_ANALYSIS=${ENABLE_LAYOUT_ANALYSIS:-true}
      - ENABLE_VALIDATION=${ENABLE_VALIDATION:-true}
      - VALIDATION_THRESHOLD=${VALIDATION_THRESHOLD:-0.8}
      - ENABLE_PRIVACY_MASK=${ENABLE_PRIVACY_MASK:-true}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - AUTO_PATH_SELECTION=${AUTO_PATH_SELECTION:-true}
      
      # MCP 配置
      - MCP_PORT=8001
      - MCP_TRANSPORT=sse
      
      # 缓存配置
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-1000}
      
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./schemas:/app/schemas:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL Database (主数据库)
  postgres:
    image: postgres:16-alpine
    container_name: pdf-etl-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-pdf_etl}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C.UTF-8
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pdf_etl}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=10MB"

  # Redis (缓存和任务队列)
  redis:
    image: redis:7-alpine
    container_name: pdf-etl-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-redis123}"
      - "--maxmemory"
      - "2gb"
      - "--maxmemory-policy"
      - "allkeys-lru"

  # MinIO (对象存储 - 用于存储 PDF 文件)
  minio:
    image: minio/minio:latest
    container_name: pdf-etl-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    command: server /data --console-address ":9001"

  # Ollama (本地 LLM - 可选)
  ollama:
    image: ollama/ollama:latest
    container_name: pdf-etl-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pdf-etl-network
    profiles:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Prometheus (监控)
  prometheus:
    image: prom/prometheus:latest
    container_name: pdf-etl-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - pdf-etl-network
    profiles:
      - monitoring
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # Grafana (可视化)
  grafana:
    image: grafana/grafana:latest
    container_name: pdf-etl-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=postgres
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - pdf-etl-network
    profiles:
      - monitoring
    depends_on:
      - prometheus
      - postgres

networks:
  pdf-etl-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
