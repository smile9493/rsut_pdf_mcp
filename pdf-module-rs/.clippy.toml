# Clippy强制检查配置
# 遵循 rust-systems-cloud-infra-guide v6.0.0 规范

# 禁止的lints - 这些lints会导致编译错误
forbid = [
    "await_holding_lock",      # 禁止在await时持有锁
    "unwrap_used",             # 禁止使用unwrap()
    "expect_used",             # 禁止使用expect()
    "panic",                   # 禁止panic!
    "todo",                    # 禁止todo!()
    "unimplemented",           # 禁止unimplemented!()
    "unreachable",             # 禁止unreachable!()
    "exit",                    # 禁止std::process::exit
    "dbg_macro",               # 禁止dbg!宏
    "print_stdout",            # 禁止println!()
    "print_stderr",            # 禁止eprintln!()
]

# 允许的lints
allow = [
    "clippy::module_inception",    # 允许模块同名
]

# 警告级别的lints
warn = [
    "clippy::all",                 # 启用所有clippy警告
    "clippy::pedantic",            # 启用pedantic级别警告
    "clippy::nursery",             # 启用nursery级别警告
    "clippy::cargo",               # 启用cargo相关警告
]
