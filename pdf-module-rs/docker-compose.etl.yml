version: '3.8'

services:
  # PDF ETL Service
  pdf-etl:
    image: pdf-module-etl:latest
    container_name: pdf-etl
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.0}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - DB_TABLE_NAME=${DB_TABLE_NAME:-extracted_documents}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - EXTRACTION_ENGINE=${EXTRACTION_ENGINE:-lopdf}
      - EXTRACTION_CHUNK_STRATEGY=${EXTRACTION_CHUNK_STRATEGY:-page}
      - EXTRACTION_CHUNK_SIZE=${EXTRACTION_CHUNK_SIZE:-1000}
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pdf-etl-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-pdf_etl}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - pdf-etl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pdf_etl}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (Optional - for local LLM)
  ollama:
    image: ollama/ollama:latest
    container_name: pdf-etl-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pdf-etl-network
    profiles:
      - ollama

  # Prometheus (Optional - for monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: pdf-etl-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - pdf-etl-network
    profiles:
      - monitoring

  # Grafana (Optional - for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: pdf-etl-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - pdf-etl-network
    profiles:
      - monitoring

networks:
  pdf-etl-network:
    driver: bridge

volumes:
  pg_data:
  ollama_data:
  prometheus_data:
  grafana_data:
