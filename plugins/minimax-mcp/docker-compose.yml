version: '3.8'

services:
  pdf-api:
    build:
      context: ../..
      dockerfile: Dockerfile.simple
    container_name: pdf-module-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_DIR=/app/data
      - CACHE_ENABLED=true
      - CACHE_MAX_SIZE=1000
      - AUDIT_ENABLED=true
      - AUDIT_LOG_DIR=/app/logs/audit
      - MAX_FILE_SIZE_MB=100
      # MiniMax配置
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_WEB_SEARCH_ENABLED=true
      - MINIMAX_IMAGE_UNDERSTAND_ENABLED=true
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/x2text/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MiniMax MCP服务
  minimax-mcp:
    image: python:3.11-slim
    container_name: minimax-mcp-server
    restart: unless-stopped
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=https://api.minimax.chat
      - MINIMAX_WEB_SEARCH_ENABLED=true
      - MINIMAX_IMAGE_UNDERSTAND_ENABLED=true
    volumes:
      - ./:/app/minimax-mcp
    working_dir: /app/minimax-mcp
    command: >
      bash -c "pip install -r requirements.txt && python server.py"
    depends_on:
      - pdf-api

  # 前端服务
  pdf-web:
    image: nginx:alpine
    container_name: pdf-module-web
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ../../web/dist:/usr/share/nginx/html:ro
      - ../../nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - pdf-api
      - minimax-mcp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: pdf-module-network
