name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pdf-module-rs/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cd pdf-module-rs
          cargo test --all-targets --all-features

      - name: Run clippy
        run: |
          cd pdf-module-rs
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: |
          cd pdf-module-rs
          cargo fmt --all -- --check

  web-build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: |
          cd web
          npm ci

      - name: Type Check
        run: |
          cd web
          npm run type-check

      - name: Lint
        run: |
          cd web
          npm run lint

      - name: Build
        run: |
          cd web
          npm run build

      - name: Package
        run: |
          cd web
          tar -czvf ../web-dist.tar.gz dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz

  build-mcp:
    name: MCP (${{ matrix.target }})
    needs: test-rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pdf-mcp-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: pdf-mcp-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: pdf-mcp-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: pdf-mcp-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: pdf-mcp-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross-compiler (macOS ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          rustup target add aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pdf-module-rs/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup environment for cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "STRIP_CMD=aarch64-linux-gnu-strip" >> $GITHUB_ENV

      - name: Build
        run: |
          cd pdf-module-rs
          cargo build --release --target ${{ matrix.target }} --bin pdf-mcp

      - name: Optimize binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          STRIP="${STRIP_CMD:-strip}"
          $STRIP pdf-mcp
          ls -lh pdf-mcp

      - name: Optimize binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          strip pdf-mcp.exe
          dir pdf-mcp.exe

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          tar -czvf ${{ matrix.artifact }}.tar.gz pdf-mcp
          mv ${{ matrix.artifact }}.tar.gz $GITHUB_WORKSPACE/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd pdf-module-rs/target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }}.zip pdf-mcp.exe
          mv ${{ matrix.artifact }}.zip $GITHUB_WORKSPACE/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  docker-mcp:
    name: Docker MCP (${{ matrix.platform }})
    needs: build-mcp
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DOCKER_ENABLED == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
          - platform: linux/arm64
            target: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MCP artifact
        uses: actions/download-artifact@v4
        with:
          name: pdf-mcp-${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'linux-x64' || (matrix.target == 'aarch64-unknown-linux-gnu' && 'linux-arm64' || 'linux-x64') }}
          path: ./binaries

      - name: Extract MCP binary
        run: |
          cd binaries
          tar -xzf *.tar.gz
          mv pdf-mcp ../

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: smile9493/pdf-mcp
          flavor: |
            suffix=-mcp
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ./docker/Dockerfile.mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  docker-web:
    name: Docker Web (${{ matrix.platform }})
    needs: web-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DOCKER_ENABLED == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
          - platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: ./web

      - name: Extract Web dist
        run: |
          cd web
          tar -xzf *.tar.gz

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: smile9493/pdf-mcp
          flavor: |
            suffix=-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          file: ./docker/Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Release
    needs: [build-mcp, web-build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## PDF Module MCP Server ${{ steps.version.outputs.VERSION }}
            
            ### MCP Client (多平台)
            - `pdf-mcp-linux-x64.tar.gz` - Linux x64
            - `pdf-mcp-linux-arm64.tar.gz` - Linux ARM64
            - `pdf-mcp-macos-x64.tar.gz` - macOS x64
            - `pdf-mcp-macos-arm64.tar.gz` - macOS ARM64
            - `pdf-mcp-windows-x64.zip` - Windows x64
            
            ### Web Frontend
            - `web-dist.tar.gz` - Vue 3 前端静态文件
            
            ### Docker Images
            ```bash
            # MCP 客户端 (stdio 协议)
            docker pull smile9493/pdf-mcp:${{ steps.version.outputs.VERSION }}-mcp
            
            # Web 前端 (nginx)
            docker pull smile9493/pdf-mcp:${{ steps.version.outputs.VERSION }}-web
            ```
            
            ### Usage
            See [README.md](https://github.com/smile9493/rsut_pdf_mcp#readme)
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
